<!DOCTYPE html>
<html>
<head>
    <title>Recipe Box</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">🍽 Recipe Box</span>
    <div>
        <a class="btn btn-light btn-sm" href="/recipes/">Home</a>
        <a class="btn btn-danger btn-sm" href="/logout/">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>

</html>
<style>
/* General page styling */
body {
    background-color: #f8f9fa;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
}

/* Headings */
h2 {
    color: #2c3e50;
    margin-bottom: 20px;
    font-weight: 600;
}

/* Recipe description */
p {
    font-size: 1rem;
    line-height: 1.6;
}

/* Reviews section */
h4 {
    margin-top: 30px;
    color: #34495e;
}
p strong {
    color: #007bff;
}

/* Tables */
.table {
    background-color: #fff;
}
.table th {
    background-color: #007bff;
    color: #fff;
    text-align: center;
}
.table td {
    vertical-align: middle;
}

/* Buttons */
.btn-primary {
    background-color: #007bff;
    border: none;
}
.btn-primary:hover {
    background-color: #0056b3;
}
.btn-success {
    background-color: #28a745;
    border: none;
}
.btn-success:hover {
    background-color: #1e7e34;
}
.btn-danger {
    background-color: #dc3545;
    border: none;
}
.btn-danger:hover {
    background-color: #a71d2a;
}
.btn-info {
    background-color: #17a2b8;
    border: none;
}
.btn-info:hover {
    background-color: #117a8b;
}

/* Form styling */
form {
    margin-top: 20px;
    padding: 15px;
    background-color: #ffffff;
    border: 1px solid #ddd;
    border-radius: 5px;
}
form button {
    margin-top: 10px;
}
</style>
